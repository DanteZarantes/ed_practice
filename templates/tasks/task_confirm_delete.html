{% extends 'base.html' %}

{% block title %}Delete Task - TaskFlow{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="form-card animate-in text-center">
            <div class="mb-4">
                <div style="width: 72px; height: 72px; border-radius: 50%; background: rgba(239, 68, 68, 0.1); border: 2px solid rgba(239, 68, 68, 0.2); display: flex; align-items: center; justify-content: center; margin: 0 auto;">
                    <i class="bi bi-exclamation-triangle" style="font-size: 2rem; color: var(--accent-red);"></i>
                </div>
            </div>
            <h3 class="fw-bold mb-2" style="color: var(--text-primary);">Delete Task?</h3>
            <p style="color: var(--text-secondary);" class="mb-4">
                Are you sure you want to delete <strong style="color: var(--text-primary);">"{{ task.title }}"</strong>?<br>
                <small style="color: var(--text-muted);">This action cannot be undone.</small>
            </p>

            <div class="d-flex gap-3 justify-content-center">
                <a href="{% url 'task_list' %}" class="btn btn-cancel">
                    <i class="bi bi-x-lg me-1"></i> Cancel
                </a>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-submit" style="background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);">
                        <i class="bi bi-trash3 me-1"></i> Delete
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
